<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="takeInput()">Click Me</button>

    <script>
      function takeInput() {
        let userInput = prompt("名前を入力してください：");

        if (userInput != null && userInput != "") {
          alert("お前が" + userInput + "を入力した");
        }
      }
    </script>
  </body>
</html>
