<!doctype html>
<html>
  <head>
    <style>
      .container {
        position: relative;
        height: 200px;
        border: 2px solid black;
      }

      #p1 {
        position: relative;
        top: 20px;
        left: 20px;
        background-color: yellow;
      }

      #p2 {
        float: right;
        background-color: lightblue;
      }

      #p3 {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background-color: lightgreen;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p id="p1">Paragraph 1: Positioned Relative</p>
      <p id="p2">Paragraph 2: Floated Right</p>
      <p id="p3">Paragraph 3: Positioned Absolute</p>
    </div>
  </body>
</html>
